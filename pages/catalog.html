<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог курсів</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/responsive.css">
    <script src="../js/main.js" defer></script>
    <script src="../js/catalog.js" defer></script>
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="logo">Мій <span>Сайт</span></div>
            <div class="header-actions">
                <button class="theme-toggle">🌓</button>
                <button class="burger-menu">☰</button>
            </div>
            <nav>
                <ul class="nav-list">
                    <li><a href="../index.html">Головна</a></li>
                    <li><a href="about.html">Про мене</a></li>
                    <li><a href="catalog.html" class="active">Каталог</a></li>
                    <li><a href="contact.html">Контакти</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container section">
        <h1>Каталог навчальних матеріалів</h1>
        
        <div class="catalog-controls">
            <input type="text" id="searchInput" placeholder="Пошук за назвою..." class="catalog-search">
            
            <select id="categoryFilter" class="catalog-select">
                <option value="all">Усі категорії</option>
                <option value="frontend">Front-end</option>
                <option value="backend">Back-end</option>
                <option value="design">Дизайн</option>
            </select>

            <select id="sortSelect" class="catalog-select">
                <option value="default">За замовчуванням</option>
                <option value="price-asc">Ціна: від дешевих</option>
                <option value="price-desc">Ціна: від дорогих</option>
                <option value="title-asc">За алфавітом (А-Я)</option>
            </select>
        </div>

        <div id="loadingState" class="status-msg">⏳ Завантаження даних...</div>
        <div id="errorState" class="status-msg error-msg" hidden>❌ Помилка завантаження. Спробуйте пізніше.</div>
        <div id="emptyState" class="status-msg" hidden>🔍 За вашим запитом нічого не знайдено.</div>

        <div id="catalogContainer" class="grid-3" hidden></div>

        <div style="text-align: center; margin-top: 30px;">
            <button id="loadMoreBtn" class="btn btn-outline" hidden>Показати ще</button>
        </div>
    </main>

    <div id="detailsModal" class="modal" hidden>
        <div class="modal-content card" style="max-width: 500px; width: 100%;">
            <button class="modal-close" id="closeDetailsModal">&times;</button>
            <h2 id="modalTitle">Назва</h2>
            <p id="modalCategory" style="color: var(--color-accent); font-weight: bold;"></p>
            <p id="modalDesc"></p>
            <p><strong>Рівень:</strong> <span id="modalLevel"></span></p>
            <p><strong>Ціна:</strong> <span id="modalPrice"></span> грн</p>
            <button class="btn btn-primary" style="width: 100%; margin-top: 15px;">Записатися</button>
        </div>
    </div>

    <footer class="site-footer">
        <div class="container footer-bottom">
            <p>&copy; <span class="current-year"></span> Тимощук Максим.</p>
        </div>
    </footer>
</body>
</html>
