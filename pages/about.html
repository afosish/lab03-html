<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Про мене — Медіа контент</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/responsive.css">
    <script src="../js/main.js" defer></script>
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="logo">Мій <span>Сайт</span></div>
            <div class="header-actions">
                <button class="theme-toggle" aria-label="Перемкнути тему">🌓</button>
                <button class="burger-menu" aria-expanded="false" aria-label="Відкрити меню">☰</button>
            </div>
            <nav>
                <ul class="nav-list">
                    <li><a href="../index.html">Головна</a></li>
                    <li><a href="about.html">Про мене</a></li>
                    <li><a href="contact.html">Контакти</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container section">
        <h1>Сторінка про мене</h1>
        
        <div class="filter-controls">
            <button class="filter-btn active" data-filter="all">Усі матеріали</button>
            <button class="filter-btn" data-filter="video">Лише Відео</button>
            <button class="filter-btn" data-filter="audio">Лише Аудіо</button>
        </div>

        <div class="media-gallery">
            <div class="card filter-item" data-category="video">
                <h2>Моє навчальне відео</h2>
                <video controls>
                    <source src="../assets/media/demo.mp4" type="video/mp4">
                    <p>Ваш браузер не підтримує HTML-відео.</p>
                </video>
            </div>

            <div class="card filter-item" data-category="audio">
                <h2>Мій улюблений аудіотрек</h2>
                <audio controls style="width: 100%; margin-top: 20px;">
                    <source src="../assets/media/demo.mp3" type="audio/mpeg">
                    <p>Ваш браузер не підтримує цей аудіофайл.</p>
                </audio>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-bottom">
            <p>&copy; <span class="current-year"></span> Тимощук Максим. Всі права захищені.</p>
        </div>
    </footer>
    <button class="back-to-top" hidden>↑</button>
</body>
</html>
