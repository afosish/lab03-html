<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти — Практична робота</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/responsive.css">
    <script src="../js/main.js" defer></script>
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="logo">Мій <span>Сайт</span></div>
            <div class="header-actions">
                <button class="theme-toggle" aria-label="Перемкнути тему">🌓</button>
                <button class="burger-menu" aria-expanded="false" aria-label="Відкрити меню">☰</button>
            </div>
            <nav>
                <ul class="nav-list">
                    <li><a href="../index.html">Головна</a></li>
                    <li><a href="about.html">Про мене</a></li>
                    <li><a href="contact.html">Контакти</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container section">
        <h1>Зв'яжіться зі мною</h1>
        
        <div class="contact-layout">
            <div class="contact-info">
                <h2>Контактна інформація</h2>
                <p><strong>Email:</strong> student@example.com</p>
                <p><strong>Локація:</strong> Україна</p>
            </div>

            <div class="form-wrapper">
                <div class="form-success" hidden>
                    <h3>Дякуємо за звернення!</h3>
                    <p>Ваші дані успішно оброблені. Ми зв'яжемося з вами найближчим часом.</p>
                </div>

                <form id="contact-form" action="#" method="POST" novalidate>
                    <div class="form-group">
                        <label for="username">Ім'я:</label>
                        <input type="text" id="username" name="username" placeholder="Ваше ім'я">
                        <span class="error-msg" id="username-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="useremail">Email:</label>
                        <input type="email" id="useremail" name="useremail" placeholder="ваш_email@example.com">
                        <span class="error-msg" id="useremail-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="subject">Тема звернення:</label>
                        <select id="subject" name="subject">
                            <option value="question">Запитання</option>
                            <option value="cooperation">Співпраця</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">Повідомлення:</label>
                        <textarea id="message" name="message" placeholder="Напишіть повідомлення..." maxlength="500"></textarea>
                        <span class="char-count">0 / 500 символів</span>
                        <span class="error-msg" id="message-error"></span>
                    </div>

                    <div style="display: flex; gap: 15px;">
                        <button type="submit" class="btn btn-primary">Надіслати</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-bottom">
            <p>&copy; <span class="current-year"></span> Тимощук Максим. Всі права захищені.</p>
        </div>
    </footer>
    <button class="back-to-top" hidden>↑</button>
</body>
</html>
